<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>RavitoAI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <span class="badge">MVP</span>
      <h1>RavitoAI</h1>
      <p>Calcule une première stratégie de glucides et d’hydratation selon ta course.</p>
    </header>

    <section class="card">
      <form id="strategy-form">
        <div class="grid">
          <label>
            Distance
            <select id="distance" required>
              <option value="10">10 km</option>
              <option value="20">20 km</option>
              <option value="21.1">Semi-marathon</option>
              <option value="42.195">Marathon</option>
              <option value="custom">Autre</option>
            </select>
          </label>

          <label id="custom-distance-wrap" class="hidden">
            Distance personnalisée (km)
            <input id="custom-distance" type="number" min="1" max="200" step="0.1" value="30">
          </label>

          <label>
            Temps estimé
            <div class="time-fields">
              <input id="hours" type="number" min="0" max="24" value="0" aria-label="Heures">
              <span>h</span>
              <input id="minutes" type="number" min="0" max="59" value="42" aria-label="Minutes">
              <span>min</span>
            </div>
          </label>

          <label>
            Température prévue
            <input id="temperature" type="number" min="-10" max="50" value="18">
          </label>

          <label>
            Transpiration
            <select id="sweat-rate">
              <option value="low">Faible</option>
              <option value="normal" selected>Normale</option>
              <option value="high">Importante</option>
            </select>
          </label>

          <label>
            Sensibilité digestive
            <select id="digestion">
              <option value="sensitive">Sensible</option>
              <option value="normal" selected>Normale</option>
              <option value="trained">Entraînée</option>
            </select>
          </label>
        </div>

        <button type="submit">Générer ma stratégie</button>
      </form>
    </section>

    <section id="result" class="card result hidden" aria-live="polite"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
